name: Build and Release

# 触发条件：
# 1. 推送 v* 格式的 tag（如 v2.0.14）→ 自动构建并发版
# 2. 手动触发（在 GitHub Actions 页面点 Run workflow）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空则使用 utils/version.py 中的值）'
        required: false
        default: ''

permissions:
  contents: write   # 创建 Release 和上传资源需要

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Read version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            V="${GITHUB_REF#refs/tags/}"
          else
            V=$(python -c "import sys; sys.path.insert(0,'utils'); from version import __version__; print(__version__)")
          fi
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Detected version: $V"

      - name: Prepare release body
        id: release_body
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          NOTES_FILE=".github/release-notes/${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "Using custom release notes from $NOTES_FILE"
            cp "$NOTES_FILE" release_body.md
          else
            echo "No custom release notes at $NOTES_FILE, using default"
            cat > release_body.md <<'EOF'
          ## 下载

          - `QQFarmBot.exe`：双击即可运行（无需解压）
          EOF
          fi
          echo "path=release_body.md" >> $GITHUB_OUTPUT

      - name: Build EXE
        run: pyinstaller build.spec --noconfirm

      - name: Verify EXE
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/QQFarmBot.exe")) {
            Write-Error "QQFarmBot.exe not found!"
            exit 1
          }
          $size = (Get-Item "dist/QQFarmBot.exe").Length / 1MB
          Write-Host "EXE size: $([math]::Round($size,2)) MB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QQFarmBot-${{ steps.version.outputs.version }}
          path: dist/QQFarmBot.exe
          if-no-files-found: error

      - name: Create Release
        # 仅 tag 推送时创建 Release；手动触发只验证构建（产物作为 artifact 上传）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: dist/QQFarmBot.exe
          body_path: ${{ steps.release_body.outputs.path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
