name: Build and Release

# 触发条件：
# 1. 推送 v* 格式的 tag（如 v2.0.14）→ 自动构建并发版
# 2. 手动触发（在 GitHub Actions 页面点 Run workflow）
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空则使用 utils/version.py 中的值）'
        required: false
        default: ''

permissions:
  contents: write   # 创建 Release 和上传资源需要

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Read version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            V="${GITHUB_REF#refs/tags/}"
          else
            V=$(python -c "import sys; sys.path.insert(0,'utils'); from version import __version__; print(__version__)")
          fi
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Detected version: $V"

      - name: Build EXE
        run: pyinstaller build.spec --noconfirm

      - name: Verify EXE
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/QQFarmBot.exe")) {
            Write-Error "QQFarmBot.exe not found!"
            exit 1
          }
          $size = (Get-Item "dist/QQFarmBot.exe").Length / 1MB
          Write-Host "EXE size: $([math]::Round($size,2)) MB"

      - name: Archive (7z)
        shell: pwsh
        run: |
          # 优先用 7z；runner 自带 7z（7-Zip 路径）
          $sevenZip = Get-Command 7z -ErrorAction SilentlyContinue
          if (-not $sevenZip) {
            $sevenZipPath = "C:\Program Files\7-Zip\7z.exe"
            if (Test-Path $sevenZipPath) { $sevenZip = $sevenZipPath }
          }
          if ($sevenZip) {
            Write-Host "Using 7z: $($sevenZip.Source ?? $sevenZip)"
            & $sevenZip a -mx=9 dist/QQFarmBot.7z dist/QQFarmBot.exe
            Write-Host "Created QQFarmBot.7z"
          } else {
            Write-Host "7z not found, fallback to zip"
            Compress-Archive -Path dist/QQFarmBot.exe -DestinationPath dist/QQFarmBot.zip -CompressionLevel Optimal
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: QQFarmBot-${{ steps.version.outputs.version }}
          path: |
            dist/QQFarmBot.7z
            dist/QQFarmBot.zip
          if-no-files-found: ignore

      - name: Create Release
        # 仅 tag 推送时创建 Release；手动触发只验证构建（产物作为 artifact 上传）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: |
            dist/QQFarmBot.7z
            dist/QQFarmBot.zip
          body: |
            ## 下载

            - `QQFarmBot.7z`（推荐，体积更小）：解压后运行 `QQFarmBot.exe`
            - `QQFarmBot.zip`（兼容）：解压后运行 `QQFarmBot.exe`

            > 由 GitHub Actions 自动构建发布，对应提交 ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
